<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爬蟲寵愛+ Module / Function Checklist</title>
    <style>
        :root {
            --bg: #eef1f4;
            --panel: #ffffff;
            --text: #18212f;
            --muted: #667085;
            --line: #d5dce7;
            --soft: #f8fafc;
            --accent: #f97316;
            --accent-dark: #c2410c;
            --ok: #15803d;
            --warn: #b45309;
            --shadow: 0 16px 42px rgba(15, 23, 42, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(14px);
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: start;
            padding: 18px 24px 14px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0;
        }

        .meta {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .principle {
            margin-top: 12px;
            max-width: 1040px;
            border: 1px solid #fed7aa;
            border-left: 5px solid var(--accent);
            border-radius: 8px;
            background: #fff7ed;
            padding: 12px 14px;
            color: #7c2d12;
            font-size: 14px;
            line-height: 1.65;
        }

        .principle strong {
            display: block;
            margin-bottom: 2px;
            color: #431407;
        }

        .progress-card {
            min-width: 220px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--soft);
            padding: 12px;
        }

        .progress-number {
            font-size: 28px;
            font-weight: 800;
        }

        .progress-label {
            color: var(--muted);
            font-size: 12px;
        }

        .progress-bar {
            height: 8px;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: #e2e8f0;
        }

        .progress-bar span {
            display: block;
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 180ms ease;
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) auto auto auto auto;
            gap: 10px;
            align-items: center;
            padding: 0 24px 16px;
        }

        input,
        select,
        button,
        textarea {
            border: 1px solid #b9c3d0;
            border-radius: 7px;
            background: #fff;
            color: #1f2937;
            font: inherit;
            font-size: 13px;
        }

        input,
        select {
            height: 36px;
            padding: 0 10px;
        }

        button {
            min-height: 36px;
            padding: 0 12px;
            cursor: pointer;
        }

        button:hover {
            border-color: var(--accent);
            color: var(--accent-dark);
            background: #fff7ed;
        }

        .primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .primary:hover {
            background: var(--accent-dark);
            color: #fff;
        }

        main {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 16px;
            padding: 18px 24px 32px;
        }

        aside {
            position: sticky;
            top: 152px;
            align-self: start;
            max-height: calc(100vh - 176px);
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .side-title {
            margin: 0;
            padding: 14px 14px 10px;
            font-size: 14px;
            font-weight: 800;
        }

        .nav-list {
            display: grid;
            gap: 2px;
            padding: 0 8px 12px;
        }

        .nav-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            min-height: 34px;
            padding: 7px 8px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            text-align: left;
        }

        .nav-item.active,
        .nav-item:hover {
            background: #fff7ed;
            color: var(--accent-dark);
        }

        .nav-count {
            color: var(--muted);
            font-size: 12px;
        }

        .content {
            min-width: 0;
        }

        .section {
            margin-bottom: 18px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .section-header {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: #fbfcfe;
        }

        .section h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .section-desc {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .section-progress {
            white-space: nowrap;
            color: var(--muted);
            font-size: 13px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid #edf1f6;
            padding: 10px 12px;
            vertical-align: top;
            text-align: left;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #f8fafc;
            color: #475467;
            font-size: 12px;
            font-weight: 800;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        tr.done {
            background: #f0fdf4;
        }

        tr.done .item-title {
            color: #166534;
            text-decoration: line-through;
            text-decoration-thickness: 1px;
        }

        .date-cell {
            width: 138px;
        }

        .check-cell {
            width: 64px;
            text-align: center;
        }

        .priority-cell {
            width: 92px;
        }

        .status-cell {
            width: 128px;
        }

        .notes-cell {
            width: 260px;
        }

        .date-input {
            width: 116px;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--ok);
        }

        .item-title {
            margin: 0;
            font-weight: 800;
            line-height: 1.45;
        }

        .item-detail {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 7px;
        }

        .tag {
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .priority {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 58px;
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 800;
        }

        .p0 { background: #fee2e2; color: #991b1b; }
        .p1 { background: #ffedd5; color: #9a3412; }
        .p2 { background: #e0f2fe; color: #075985; }
        .p3 { background: #f1f5f9; color: #475569; }

        .status-select {
            width: 106px;
        }

        .notes-input {
            width: 100%;
            min-height: 40px;
            resize: vertical;
            padding: 8px 9px;
            line-height: 1.45;
        }

        .empty {
            display: none;
            padding: 28px;
            border: 1px dashed var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 1080px) {
            .hero,
            .toolbar,
            main {
                grid-template-columns: 1fr;
            }

            aside {
                position: static;
                max-height: none;
            }

            .toolbar {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 760px) {
            header,
            main {
                padding-left: 14px;
                padding-right: 14px;
            }

            .toolbar {
                padding-left: 14px;
                padding-right: 14px;
            }

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                border-bottom: 1px solid var(--line);
                padding: 10px 0;
            }

            td {
                border-bottom: 0;
                padding: 6px 12px;
            }

            .date-cell,
            .check-cell,
            .priority-cell,
            .status-cell,
            .notes-cell {
                width: auto;
            }

            .date-cell::before { content: "日期"; }
            .check-cell::before { content: "完成"; }
            .priority-cell::before { content: "優先"; }
            .status-cell::before { content: "狀態"; }
            .notes-cell::before { content: "備註"; }

            td::before {
                display: block;
                margin-bottom: 4px;
                color: var(--muted);
                font-size: 11px;
                font-weight: 800;
            }
        }
    </style>
</head>
<body>
    <header>
        <section class="hero">
            <div>
                <h1>爬蟲寵愛+ Module / Function Checklist</h1>
                <p class="meta">依 `docs/spec` 與目前前端 mock 整理。工程師可逐項填日期、狀態、備註並勾選完成；資料會存在本機瀏覽器。</p>
                <div class="principle">
                    <strong>開發大原則：AI First</strong>
                    所有核心介面與資料流都應優先考慮 AI 能讀、能解釋、能輔助決策：寵物狀態、紀錄、計畫、相簿、討論與會員資料需要結構化；使用者完成紀錄或修改資料後，AI 摘要與後續提醒應能同步反映最新脈絡。
                </div>
            </div>
            <div class="progress-card" aria-live="polite">
                <div class="progress-number" id="overallPercent">0%</div>
                <div class="progress-label" id="overallLabel">0 / 0 completed</div>
                <div class="progress-bar"><span id="overallBar"></span></div>
            </div>
        </section>

        <section class="toolbar" aria-label="Checklist controls">
            <input id="searchInput" type="search" placeholder="搜尋功能、模組、關鍵字">
            <select id="sectionFilter" aria-label="篩選模組"></select>
            <select id="priorityFilter" aria-label="篩選優先級">
                <option value="all">全部優先級</option>
                <option value="P0">P0 核心</option>
                <option value="P1">P1 重要</option>
                <option value="P2">P2 支援</option>
                <option value="P3">P3 後續</option>
            </select>
            <select id="doneFilter" aria-label="篩選完成狀態">
                <option value="all">全部狀態</option>
                <option value="open">未完成</option>
                <option value="done">已完成</option>
            </select>
            <button type="button" id="exportButton">匯出 JSON</button>
            <button type="button" id="resetButton">清除本機紀錄</button>
        </section>
    </header>

    <main>
        <aside>
            <p class="side-title">模組導覽</p>
            <nav class="nav-list" id="sideNav" aria-label="Checklist sections"></nav>
        </aside>

        <section class="content">
            <div id="sections"></div>
            <div class="empty" id="emptyState">目前篩選條件下沒有項目。</div>
        </section>
    </main>

        const defaultItemState = () => ({ done: false, date: "", status: "todo", notes: "" });
        let state = loadState();

        function loadState() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            } catch {
                return {};
            }
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function itemState(id) {
            if (!state[id]) state[id] = defaultItemState();
            return state[id];
        }

        function allItems() {
            return sections.flatMap((section) => section.items.map((item) => ({ section, item })));
        }

        function priorityClass(priority) {
            return priority.toLowerCase();
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;");
        }

        function renderFilters() {
            const select = document.getElementById("sectionFilter");
            select.innerHTML = `<option value="all">全部模組</option>` + sections
                .map((section) => `<option value="${section.id}">${section.title}</option>`)
                .join("");
        }

        function renderSideNav(visibleCounts) {
            const sideNav = document.getElementById("sideNav");
            sideNav.innerHTML = sections.map((section) => {
                const count = visibleCounts.get(section.id) || 0;
                return `<button type="button" class="nav-item" data-section-jump="${section.id}">
                    <span>${section.title}</span>
                    <span class="nav-count">${count}</span>
                </button>`;
            }).join("");

            sideNav.querySelectorAll("[data-section-jump]").forEach((button) => {
                button.addEventListener("click", () => {
                    const target = document.getElementById(`section-${button.dataset.sectionJump}`);
                    if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
                });
            });
        }

        function matchesFilters(section, item) {
            const query = document.getElementById("searchInput").value.trim().toLowerCase();
            const sectionFilter = document.getElementById("sectionFilter").value;
            const priorityFilter = document.getElementById("priorityFilter").value;
            const doneFilter = document.getElementById("doneFilter").value;
            const [id, title, detail, priority, tags] = item;
            const current = itemState(id);
            const haystack = `${section.title} ${title} ${detail} ${priority} ${tags.join(" ")}`.toLowerCase();

            if (sectionFilter !== "all" && section.id !== sectionFilter) return false;
            if (priorityFilter !== "all" && priority !== priorityFilter) return false;
            if (doneFilter === "done" && !current.done) return false;
            if (doneFilter === "open" && current.done) return false;
            if (query && !haystack.includes(query)) return false;
            return true;
        }

        function render() {
            const container = document.getElementById("sections");
            const visibleCounts = new Map();
            let renderedSections = 0;

            container.innerHTML = sections.map((section) => {
                const visibleItems = section.items.filter((item) => matchesFilters(section, item));
                visibleCounts.set(section.id, visibleItems.length);
                if (!visibleItems.length) return "";
                renderedSections += 1;

                const doneInSection = section.items.filter((item) => itemState(item[0]).done).length;
                const rows = visibleItems.map((item) => {
                    const [id, title, detail, priority, tags] = item;
                    const current = itemState(id);
                    const doneClass = current.done ? "done" : "";
                    return `<tr class="${doneClass}" data-item-id="${id}">
                        <td class="date-cell"><input class="date-input" type="date" value="${escapeHtml(current.date)}" data-field="date" data-id="${id}"></td>
                        <td class="check-cell"><input class="checkbox" type="checkbox" ${current.done ? "checked" : ""} data-field="done" data-id="${id}" aria-label="完成 ${escapeHtml(title)}"></td>
                        <td>
                            <p class="item-title">${escapeHtml(title)}</p>
                            <p class="item-detail">${escapeHtml(detail)}</p>
                            <div class="tag-row">${tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
                        </td>
                        <td class="priority-cell"><span class="priority ${priorityClass(priority)}">${priority}</span></td>
                        <td class="status-cell">
                            <select class="status-select" data-field="status" data-id="${id}">
                                <option value="todo" ${current.status === "todo" ? "selected" : ""}>待做</option>
                                <option value="doing" ${current.status === "doing" ? "selected" : ""}>開發中</option>
                                <option value="review" ${current.status === "review" ? "selected" : ""}>待檢查</option>
                                <option value="done" ${current.status === "done" ? "selected" : ""}>完成</option>
                                <option value="blocked" ${current.status === "blocked" ? "selected" : ""}>卡住</option>
                            </select>
                        </td>
                        <td class="notes-cell"><textarea class="notes-input" data-field="notes" data-id="${id}" placeholder="工程備註 / PR / blocker">${escapeHtml(current.notes)}</textarea></td>
                    </tr>`;
                }).join("");

                return `<section class="section" id="section-${section.id}">
                    <div class="section-header">
                        <div>
                            <h2>${section.title}</h2>
                            <p class="section-desc">${section.desc}</p>
                        </div>
                        <div class="section-progress">${doneInSection} / ${section.items.length}</div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>完成</th>
                                <th>功能 / 驗收重點</th>
                                <th>優先</th>
                                <th>狀態</th>
                                <th>備註</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </section>`;
            }).join("");

            renderSideNav(visibleCounts);
            document.getElementById("emptyState").style.display = renderedSections ? "none" : "block";
            bindItemEvents();
            updateProgress();
        }

        function bindItemEvents() {
            document.querySelectorAll("[data-field]").forEach((input) => {
                const eventName = input.dataset.field === "notes" ? "input" : "change";
                input.addEventListener(eventName, handleFieldChange);
            });
        }

        function handleFieldChange(event) {
            const target = event.currentTarget;
            const id = target.dataset.id;
            const field = target.dataset.field;
            const current = itemState(id);

            if (field === "done") {
                current.done = target.checked;
                if (target.checked) {
                    if (!current.date) current.date = new Date().toISOString().slice(0, 10);
                    current.status = "done";
                } else if (current.status === "done") {
                    current.status = "todo";
                }
            } else {
                current[field] = target.value;
                if (field === "status") current.done = target.value === "done";
            }

            saveState();
            if (field === "done" || field === "status") {
                render();
            } else {
                updateProgress();
            }
        }

        function updateProgress() {
            const items = allItems();
            const done = items.filter(({ item }) => itemState(item[0]).done).length;
            const total = items.length;
            const percent = total ? Math.round((done / total) * 100) : 0;
            document.getElementById("overallPercent").textContent = `${percent}%`;
            document.getElementById("overallLabel").textContent = `${done} / ${total} completed`;
            document.getElementById("overallBar").style.width = `${percent}%`;
        }

        function exportState() {
            const payload = {
                exportedAt: new Date().toISOString(),
                storageKey: STORAGE_KEY,
                state
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "reptile-love-plus-module-checklist-state.json";
            link.click();
            URL.revokeObjectURL(url);
        }

        function resetState() {
            if (!confirm("確定要清除這份 checklist 在本機瀏覽器的勾選、日期與備註嗎？")) return;
            state = {};
            localStorage.removeItem(STORAGE_KEY);
            render();
        }

        renderFilters();
        render();

        document.getElementById("searchInput").addEventListener("input", render);
        document.getElementById("sectionFilter").addEventListener("change", render);
        document.getElementById("priorityFilter").addEventListener("change", render);
        document.getElementById("doneFilter").addEventListener("change", render);
        document.getElementById("exportButton").addEventListener("click", exportState);
        document.getElementById("resetButton").addEventListener("click", resetState);
    </script>
